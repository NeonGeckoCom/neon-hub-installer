---
# Bootstrap users that HANA needs in order to function with auth enabled:
#
#   1. Hub admin — full ADMIN permissions, used by neon-hub-config to make
#      authenticated calls to HANA. Credentials persisted to hub_admin.yaml
#      so hub-config can re-authenticate across restarts.
#   2. Neon node — NODE permissions, used by the Neon Node Voice Client
#      to authenticate as the local node. Credentials referenced from
#      neon.yaml (hana.node_pw is generated by generate-secrets.yaml).
#
# Required vars (set in hub.yaml):
#   hana_url              — base URL, e.g. http://localhost:8082
#   hub_admin_username    — admin username (from installer prompt)
#   hub_admin_password    — admin password (from installer prompt)
#   hub_admin_token_file  — path to hub_admin.yaml
#
# Required secrets (from generate-secrets.yaml):
#   hana.node_pw          — password for the neon_node user
#
# Idempotent: register accepts 409 (user already exists) so re-runs work.

- name: Wait for HANA to be ready (up to 2 minutes)
  ansible.builtin.uri:
    url: "{{ hana_url }}/docs"
    method: GET
    status_code: 200
  register: hana_status
  retries: 24
  delay: 5
  until: hana_status.status == 200
  # /docs is FastAPI's built-in OpenAPI UI — always 200 once the app is up.
  # If HANA never becomes ready, the playbook fails and the installer
  # surfaces it via the existing error path.

# /user/get talks to neon-users-service via RabbitMQ. Wait for the broker
# to be ready before any user-management calls; users-service warm-up after
# that is covered by retries on individual requests.
- name: Wait for RabbitMQ AMQP port (up to 2 minutes)
  ansible.builtin.wait_for:
    host: localhost
    port: 5672
    timeout: 120

# --- Hub admin user ---------------------------------------------------------

# Register first so the user actually exists in users-service. Login-first
# is unsafe because HANA may issue tokens for non-existent users when MQ
# is misconfigured, masking real failures further down the chain.
- name: Register Hub admin
  ansible.builtin.uri:
    url: "{{ hana_url }}/auth/register"
    method: POST
    body_format: json
    body:
      username: "{{ hub_admin_username }}"
      password: "{{ hub_admin_password }}"
    status_code: [200, 201, 409]  # 409 = already exists, OK on re-run
  register: admin_register
  retries: 12
  delay: 10
  until: admin_register.status in [200, 201, 409]
  no_log: true

- name: Log in as Hub admin
  ansible.builtin.uri:
    url: "{{ hana_url }}/auth/login"
    method: POST
    body_format: json
    body:
      username: "{{ hub_admin_username }}"
      password: "{{ hub_admin_password }}"
      token_name: hub-admin
    status_code: 200
  register: admin_login
  no_log: true

- name: Fetch admin user record
  ansible.builtin.uri:
    url: "{{ hana_url }}/user/get"
    method: POST
    headers:
      Authorization: "Bearer {{ admin_login.json.access_token }}"
    body_format: json
    body:
      username: "{{ hub_admin_username }}"
    status_code: 200
  register: admin_user_get
  # no_log omitted so failure detail reaches the log; response may contain
  # password_hash — rotate the admin password if the log is shared publicly.

- name: Grant ADMIN permissions to Hub admin
  ansible.builtin.uri:
    url: "{{ hana_url }}/user/update"
    method: POST
    headers:
      Authorization: "Bearer {{ admin_login.json.access_token }}"
    body_format: json
    body:
      user: >-
        {{ admin_user_get.json | combine({
             'permissions': {
               'klat': 20, 'core': 30, 'diana': 30, 'users': 30,
               'node': 20, 'hub': 30, 'llm': 20
             }
           }) }}
    status_code: 200
  no_log: true

- name: Re-login to pick up new permissions on the refresh token
  ansible.builtin.uri:
    url: "{{ hana_url }}/auth/login"
    method: POST
    body_format: json
    body:
      username: "{{ hub_admin_username }}"
      password: "{{ hub_admin_password }}"
      token_name: hub-admin
    status_code: 200
  register: admin_auth_final
  no_log: true

- name: Ensure hub_admin.yaml parent directory exists
  ansible.builtin.file:
    path: "{{ hub_admin_token_file | dirname }}"
    state: directory
    mode: "0755"
    owner: neon
    group: neon

- name: Write hub_admin.yaml
  ansible.builtin.copy:
    dest: "{{ hub_admin_token_file }}"
    mode: "0600"
    owner: neon
    group: neon
    content: |
      username: {{ hub_admin_username | to_json }}
      password: {{ hub_admin_password | to_json }}
      refresh_token: {{ admin_auth_final.json.refresh_token | to_json }}
  no_log: true

# --- Neon node user ---------------------------------------------------------
# Only needed when the Neon Node Voice Client is installed on this host —
# it authenticates to HANA as `neon_node` using hana.node_pw. With auth
# enabled, this user must exist in users-service for the node to function.
# QR pairing of external Node devices uses the admin's own NODE-scoped
# tokens (via /auth/login with node_auth: true), not this user.

- name: Register neon_node user
  ansible.builtin.uri:
    url: "{{ hana_url }}/auth/register"
    method: POST
    body_format: json
    body:
      username: neon_node
      password: "{{ hana.node_pw }}"
    status_code: [200, 201, 409]
  register: node_register
  no_log: true
  when: install_neon_node | string == "1"

- name: Log in as Hub admin to manage node permissions
  ansible.builtin.uri:
    url: "{{ hana_url }}/auth/login"
    method: POST
    body_format: json
    body:
      username: "{{ hub_admin_username }}"
      password: "{{ hub_admin_password }}"
      token_name: hub-admin
    status_code: 200
  register: admin_login_for_node_perms
  no_log: true
  when: install_neon_node | string == "1"

- name: Fetch neon_node user record
  ansible.builtin.uri:
    url: "{{ hana_url }}/user/get"
    method: POST
    headers:
      Authorization: "Bearer {{ admin_login_for_node_perms.json.access_token }}"
    body_format: json
    body:
      username: neon_node
    status_code: 200
  register: node_user_get
  when: install_neon_node | string == "1"

- name: Grant NODE permissions to neon_node
  # AccessRoles.NODE = -1; the node user gets node-scoped access only.
  ansible.builtin.uri:
    url: "{{ hana_url }}/user/update"
    method: POST
    headers:
      Authorization: "Bearer {{ admin_login_for_node_perms.json.access_token }}"
    body_format: json
    body:
      user: >-
        {{ node_user_get.json | combine({
             'permissions': {
               'klat': -1, 'core': -1, 'diana': -1, 'users': -1,
               'node': -1, 'hub': -1, 'llm': -1
             }
           }) }}
    status_code: 200
  no_log: true
  when: install_neon_node | string == "1"
