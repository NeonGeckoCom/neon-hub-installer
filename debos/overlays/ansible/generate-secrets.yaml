---
# Map of user-provided passwords from installer.sh (empty string = auto-generate).
# Defined here so the rest of the playbook doesn't need to know about them.
- name: Build user-provided password overrides
  ansible.builtin.set_fact:
    _user_password_overrides:
      simple_docker_manager: "{{ sdm_password | default('', true) }}"
      neon_skill_config: "{{ skill_config_password | default('', true) }}"
  no_log: true

# Only generate secrets if they are not already defined.
# For services that accepted a user-provided password, use it; otherwise generate.
- name: Generate secrets for Neon services
  ansible.builtin.set_fact:
    users: "{{ users | combine({item.key: {'password': (_user_password_overrides.get(item.key, '') if (_user_password_overrides.get(item.key, '') | length > 0) else lookup('password', '/dev/null chars=ascii_letters,digits length=32'))}}) }}"
  loop: "{{ users | dict2items }}"
  no_log: true

- name: Generate secrets for HANA tokens
  ansible.builtin.set_fact:
    hana: "{{ hana | combine({item.key: lookup('password', '/dev/null chars=ascii_letters,digits length=64')}) }}"
  loop: "{{ hana | dict2items }}"
  no_log: true

- name: Combine all secrets into a single variable
  ansible.builtin.set_fact:
    neon_hub_secrets:
      users: "{{ users }}"
      hana: "{{ hana }}"
  no_log: true

- name: Save secrets to file
  copy:
    content: "{{ neon_hub_secrets | to_nice_yaml }}"
    dest: "{{ secrets_file }}"
  no_log: true
