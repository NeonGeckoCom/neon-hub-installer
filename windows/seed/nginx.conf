events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    server_tokens off;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Neon Hub Config
    server {
        listen 443 ssl;
        server_name config.neon-hub-win.local;

        ssl_certificate /etc/ssl/certs/neon-hub-win.local.crt;
        ssl_certificate_key /etc/ssl/private/neon-hub-win.local.key;

        location / {
            proxy_pass http://neon-hub-config;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_redirect off;
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_intercept_errors on;
            error_page 502 503 504 = @fallback;
        }

        location @fallback {
            return 503 "Service temporarily unavailable";
        }
    }

    # STT
    server {
        listen 443 ssl;
        server_name fasterwhisper.neon-hub-win.local;

        ssl_certificate /etc/ssl/certs/neon-hub-win.local.crt;
        ssl_certificate_key /etc/ssl/private/neon-hub-win.local.key;

        location / {
            proxy_pass http://fasterwhisper:8080;
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_intercept_errors on;
            error_page 502 503 504 = @fallback;
        }

        location @fallback {
            return 503 "Service temporarily unavailable";
        }
    }

    # TTS
    server {
        listen 443 ssl;
        server_name coqui.neon-hub-win.local;

        ssl_certificate /etc/ssl/certs/neon-hub-win.local.crt;
        ssl_certificate_key /etc/ssl/private/neon-hub-win.local.key;

        location = / {
            return 302 /gradio/;
        }

        location / {
            proxy_pass http://coqui:9666;
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_intercept_errors on;
